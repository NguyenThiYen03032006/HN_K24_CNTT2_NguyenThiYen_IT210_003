<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách khóa học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

<h2 class="mb-4 text-primary">Quản lý khóa học</h2>

<form th:action="@{/courses}" method="get" class="row g-3 mb-4">
    <div class="col-md-5">
        <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Search">
    </div>
    <div class="col-md-2">
        <button type="submit" class="btn btn-secondary">Search</button>
    </div>
    <div class="col-md-2">
        <a th:href="@{/courses/add}" class="btn btn-primary">Add</a>
    </div>
</form>

<table class="table table-bordered" th:if="${not #lists.isEmpty(courses)}">
    <thead>
    <tr>
        <th>STT</th>
        <th>Tên khóa học</th>
        <th>Giảng viên</th>
        <th>Thời lượng</th>
        <th>Ảnh</th>
        <th>Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="c, iter : ${courses}">
        <td th:text="${iter.index + 1}"></td>
        <td th:text="${c.courseName}"></td>
        <td th:text="${c.instructor}"></td>
        <td th:text="${c.duration}"></td>
        <td>
            <img th:src="${c.thumbnail != null && !c.thumbnail.isEmpty() ? '/uploads/' + c.thumbnail : '/images/default.png'}"
                 width="100">
        </td>
        <td>
            <a th:href="@{/courses/edit/{id}(id=${c.id})}" class="btn btn-warning btn-sm">Sửa</a>
            <a th:href="@{/courses/delete/{id}(id=${c.id})}"
               onclick="return confirm('Bạn có chắc muốn xóa?')"
               class="btn btn-danger btn-sm">Xóa</a>
        </td>
    </tr>
    </tbody>
</table>

<div th:if="${#lists.isEmpty(courses)}" class="text-center">
    Chưa có khóa học nào
</div>

</body>
</html>
